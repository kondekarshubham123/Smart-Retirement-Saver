services:
  backend-api:
    build: ./backend
    container_name: blk-hacking-ind-shubham-kondekar
    ports:
      - "5477:5477"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5477", "--reload", "--reload-dir", "app" ]

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/Dockerfile # Reuse backend Dockerfile for simplicity or create new?
      # Actually, better to create a simplified one for frontend or just let user run it with npm.
      # For now, I'll keep it as an optional service or just leave it out of compose if not Dockerized.
    profiles: [ "frontend" ] # Only run if explicitly asked
    # ... (skipping for now to avoid complexity)
