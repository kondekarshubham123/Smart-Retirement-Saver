services:
  backend-api:
    image: kondekarshubham123/blk-hacking-ind-shubham-kondekar:latest
    container_name: blk-hacking-ind-shubham-kondekar
    ports:
      - "5477:5477"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    # Removed volume mount for final image as requested
    command: [ "gunicorn", "app.main:app", "-k", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:5477" ]

  celery-worker:
    image: kondekarshubham123/blk-hacking-ind-shubham-kondekar:latest
    command: celery -A app.tasks.celery_app.celery worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - ./backend/.env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    image: kondekarshubham123/blk-hacking-ind-shubham-kondekar-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blk-hacking-ind-shubham-kondekar-frontend
    ports:
      - "80:80"
    depends_on:
      - backend-api
